kind = "web"
previewPath = "/"
title = "Proforma Africa"
version = "1.0.0"
id = "artifacts/proforma-africa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "cd /home/runner/workspace && pnpm dev"

[services.production]
build = [ "pnpm", "run", "build" ]
publicDir = "dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
