kind = "web"
previewPath = "/"
title = "Proforma Africa"
version = "1.0.0"
id = "artifacts/proforma-africa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23540

[services.development]
run = "pnpm --filter @workspace/proforma-africa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proforma-africa", "run", "build" ]
publicDir = "artifacts/proforma-africa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23540"
BASE_PATH = "/"
